{% extends "base.html" %}
{% block content %}
<h1>{{ t['settings'] }}</h1>

<div class="card">
  <h2>{{ t['profile'] }}</h2>
  <form method="POST" action="{{ url_for('update_profile') }}" enctype="multipart/form-data">
    <label>Nama</label>
    <input type="text" name="name" value="{{ current_user.name }}" required>
    <label>Email</label>
    <input type="email" name="email" value="{{ current_user.email }}" required>
    <label>Foto Profil</label>
    <input type="file" name="photo" accept="image/*">
    <button type="submit" class="btn btn-primary">{{ t['save'] }}</button>
  </form>
</div>

<div class="card">
  <h2>{{ t['preferences'] }}</h2>
  <form method="POST" action="{{ url_for('update_preferences') }}">
    <label>Bahasa</label>
    <select name="language">
      <option value="id" {{ 'selected' if current_user.language == 'id' }}>Indonesia</option>
      <option value="en" {{ 'selected' if current_user.language == 'en' }}>English</option>
    </select>
    <label>Tema</label>
    <select name="theme">
      <option value="light" {{ 'selected' if current_user.theme == 'light' }}>Light</option>
      <option value="dark" {{ 'selected' if current_user.theme == 'dark' }}>Dark</option>
    </select>
    <label>Zona Waktu</label>
    <input type="text" name="timezone" value="{{ current_user.timezone }}">
    <button type="submit" class="btn btn-primary">{{ t['save'] }}</button>
  </form>
</div>

<div class="card">
  <h2>{{ t['security'] }}</h2>
  <form method="POST" action="{{ url_for('update_password') }}">
    <input type="password" name="current_password" placeholder="Password saat ini" required>
    <input type="password" name="new_password" placeholder="Password baru" required>
    <input type="password" name="confirm_password" placeholder="Konfirmasi password" required>
    <button type="submit" class="btn btn-primary">{{ t['change_password'] }}</button>
  </form>
</div>

<div class="card">
  <h2>{{ t['export_data'] }}</h2>
  <a href="{{ url_for('export_data') }}" class="btn btn-secondary">{{ t['export'] }}</a>
</div>

<div class="card">
  <h2>{{ t['delete_account'] }}</h2>
  <form method="POST" action="{{ url_for('delete_account') }}">
    <button type="submit" class="btn btn-danger">{{ t['delete'] }}</button>
  </form>
</div>
{% endblock %}
