{% extends "base.html" %}
{% block content %}
<h1>{{ t['groups'] }}</h1>

<div class="card">
  <h2>{{ t['your_groups'] }}</h2>
  <ul>
    {% for m in memberships %}
      <li>
        <a href="{{ url_for('group_detail', id=m.group.id) }}">{{ m.group.name }}</a>
        <span class="badge">{{ m.role }}</span>
      </li>
    {% else %}
      <li>{{ t['no_groups'] }}</li>
    {% endfor %}
  </ul>
</div>

<div class="card">
  <h2>{{ t['create_group'] }}</h2>
  <form method="POST" action="{{ url_for('create_group') }}">
    <input type="text" name="name" placeholder="Nama grup" required>
    <button type="submit" class="btn btn-primary">{{ t['create'] }}</button>
  </form>
</div>

<div class="card">
  <h2>{{ t['join_group'] }}</h2>
  <form method="POST" action="{{ url_for('join_group') }}">
    <input type="text" name="code" placeholder="Kode grup" required>
    <button type="submit" class="btn btn-secondary">{{ t['join'] }}</button>
  </form>
</div>
{% endblock %}
