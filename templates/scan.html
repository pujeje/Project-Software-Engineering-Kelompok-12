<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Struk - FinTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>💰 FinTrack</h1>
    <p>Kelola keuanganmu dengan mudah</p>
</header>

<nav class="navbar">
    <a href="/">🏠 Beranda</a>
    <a href="/report">📊 Laporan</a>
    <a href="/scan" class="active">📷 Scan Struk</a>
    <span style="margin-left:auto; font-size:13px; color:#666;">
        👤 {{ current_user.name }}
    </span>
    <a href="/logout" class="btn btn-danger" style="padding: 5px 14px;">Logout</a>
    <a href="/groups">👥 Sharing</a>
</nav>

<main>
    <div class="card form-card">
        <h2>📷 Scan Struk Belanja</h2>
        <p style="color:#666; font-size:14px; margin-bottom:20px;">
            Upload foto struk, AI akan otomatis membaca dan mengisi data transaksi.
        </p>

        <!-- Form Upload -->
        <form method="POST" action="/scan" enctype="multipart/form-data">
            <div class="form-group">
                <label>Upload Foto Struk</label>
                <input type="file" name="receipt" accept="image/*" required
                       onchange="previewImage(this)">
            </div>

            <!-- Preview gambar -->
            <div id="preview-box" style="display:none; margin-bottom:16px;">
                <img id="preview-img" src=""
                     style="max-width:100%; max-height:300px; border-radius:8px; border:1px solid #e5e7eb;">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
                🔍 Scan Struk
            </button>
        </form>

        <!-- Hasil Scan -->
        {% if result %}
        <div style="margin-top:32px; border-top:1px solid #e5e7eb; padding-top:24px;">
            <h3 style="margin-bottom:16px; color:#2d6a4f;">✅ Hasil Scan — Konfirmasi Data</h3>

            <form method="POST" action="/add">
                <div class="form-group">
                    <label>Judul Transaksi</label>
                    <input type="text" name="title" value="{{ result.title }}" required>
                </div>

                <div class="form-group">
                    <label>Jumlah (Rp)</label>
                    <input type="number" name="amount" value="{{ result.amount }}" min="0" required>
                </div>

                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" name="date" value="{{ result.date }}">
                </div>

                <div class="form-group">
                    <label>Tipe</label>
                    <select name="type">
                        <option value="expense" selected>Pengeluaran</option>
                        <option value="income">Pemasukan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Kategori</label>
                    <select name="category">
                        {% set categories = ['Makanan','Transport','Belanja','Hiburan','Kesehatan','Pendidikan','Gaji','Lainnya'] %}
                        {% for cat in categories %}
                            <option value="{{ cat }}" {{ 'selected' if result.category == cat }}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Catatan (item yang terdeteksi)</label>
                    <textarea name="note">{{ result.note }}</textarea>
                </div>

                <div class="form-actions">
                    <a href="/scan" class="btn btn-secondary">Scan Ulang</a>
                    <button type="submit" class="btn btn-primary">Simpan Transaksi</button>
                </div>
            </form>
        </div>
        {% endif %}

    </div>
</main>

<script>
function previewImage(input) {
    const box = document.getElementById('preview-box');
    const img = document.getElementById('preview-img');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            box.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>

</body>
</html>
