<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Transaksi - FinTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>💰 FinTrack</h1>
    <p>{{ t['desc_app'] }}</p>
</header>

<main>
    <div class="card form-card">
        <h2>{{ t['add_title'] }}</h2>

        <form method="POST" action="/add">

            <div class="form-group">
                <label>{{ t['form_title'] }}i</label>
                <input type="text" name="title" placeholder="Contoh: Beli makan siang" required>
            </div>

            <div class="form-group">
                <label>{{ t['form_amount'] }} (Rp)</label>
                <input type="number" name="amount" placeholder="Contoh: 25000" min="0" required>
            </div>

            <div class="form-group">
                <label>{{ t['form_date'] }}</label>
                <input type="date" name="date" value="{{ today }}">
            </div>

            <div class="form-group">
                <label>{{ t['form_type'] }}</label>
                <select name="type">
                    <option value="expense">{{ t['expense'] }}</option>
                    <option value="income">{{ t['income'] }}</option>
                </select>
            </div>

            <div class="form-group">
                <label>{{ t['form_category'] }}</label>
                <select name="category">
                    <option value="Makanan">{{ t['food'] }}</option>
                    <option value="Transport">{{ t['transport'] }}</option>
                    <option value="Belanja">{{ t['shopping'] }}</option>
                    <option value="Hiburan">{{ t['entertainment'] }}</option>
                    <option value="Kesehatan">{{ t['health'] }}</option>
                    <option value="Pendidikan">{{ t['education'] }}</option>
                    <option value="Gaji">{{ t['salary'] }}</option>
                    <option value="Lainnya">{{ t['other'] }}</option>
                </select>
            </div>

            <div class="form-group">
                <label>{{ t['form_note'] }} (opsional)</label>
                <textarea name="note" placeholder="Tambahkan catatan..."></textarea>
            </div>

            <div class="form-actions">
                <a href="/" class="btn btn-secondary">{{ t['btn_cancel'] }}</a>
                <button type="submit" class="btn btn-primary">{{ t['btn_save'] }}</button>
            </div>

        </form>
    </div>
</main>

<script>
function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
}
function updateThemeIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const icons = document.querySelectorAll('.theme-icon');
    icons.forEach(i => i.textContent = isDark ? '🌙' : '☀️');
}
// Load saved theme on page load
(function() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.addEventListener('DOMContentLoaded', updateThemeIcon);
})();
</script>
</body>
</html>
