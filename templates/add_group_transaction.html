<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t['add_group_transaction'] }} - FinTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
  <h2>{{ t['add_group_transaction'] }}</h2>

  <!-- Pilih mode -->
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label>{{ t['select_mode'] }}</label>
      <select name="mode" onchange="toggleMode(this.value)">
        <option value="manual">{{ t['manual'] }}</option>
        <option value="scan">{{ t['scan'] }}</option>
      </select>
    </div>

    <!-- Form manual -->
    <div id="manual-form">
      <div class="form-group">
        <label>{{ t['title'] }}</label>
        <input type="text" name="title" required>
      </div>
      <div class="form-group">
        <label>{{ t['category'] }}</label>
        <input type="text" name="category" required>
      </div>
      <div class="form-group">
        <label>{{ t['type'] }}</label>
        <select name="type">
          <option value="income">{{ t['income'] }}</option>
          <option value="expense">{{ t['expense'] }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>{{ t['amount'] }}</label>
        <input type="number" name="amount" required>
      </div>
    </div>

    <!-- Form scan -->
    <div id="scan-form" style="display:none;">
      <div class="form-group">
        <label>{{ t['upload_receipt'] }}</label>
        <input type="file" name="receipt" accept="image/*">
      </div>
    </div>

    <button type="submit" class="btn btn-primary">{{ t['add_transaction'] }}</button>
  </form>
</div>

<script>
function toggleMode(val) {
  document.getElementById('manual-form').style.display = (val === 'manual') ? 'block' : 'none';
  document.getElementById('scan-form').style.display   = (val === 'scan') ? 'block' : 'none';
}
</script>

</body>
</html>
